# PR-Agent 설정
[config]
response_language = "ko-KR"
model = "gemini/gemini-3.5-flash"

[pr_reviewer]
extra_instructions = """
1. Answer in Korea(모든 리뷰 코멘트를 한국어로 작성해 주세요.)
2. 코드의 가독성과 유지보수성을 중점적으로 평가하고, 복잡한 로직은 단순화할 방향을 제시할 것.
3. 잠재적인 버그나 예외 처리가 누락된 엣지 케이스(Edge case)가 있는지 꼼꼼하게 확인할 것.
4. 보안 취약점(예: SQL 인젝션, XSS, 민감한 정보 노출)이 발생할 여지가 있는지 점검할 것.
5. 성능 저하를 유발할 수 있는 비효율적인 로직(예: DB N+1 문제, 불필요한 UI 렌더링, 메모리 누수)을 찾아 지적할 것.
6. SOLID 원칙 및 클린 코드(Clean Code) 철학을 준수하며 모듈화가 잘 되어 있는지 평가할 것.
7. 에러 처리(Error Handling)가 적절한 계층에서 의미 있는 메시지와 함께 구현되었는지 확인할 것.
8. 하드코딩된 매직 넘버나 문자열이 있다면 환경 변수나 공통 상수로 분리하도록 권장할 것.
9. 불필요한 주석, 디버깅용 로그, 또는 사용되지 않는 코드(Dead Code)가 남아있는지 확인할 것.
10. 작성된 테스트 코드가 있다면, 비즈니스 로직의 핵심 시나리오를 제대로 커버하고 있는지 점검할 것.
"""

[pr_description]
extra_instructions = """
1. PR 설명과 요약은 반드시 한국어로 작성할 것.
2. 이 PR이 해결하고자 하는 핵심 문제나 새롭게 추가된 주요 기능을 첫 문단에 한 문장으로 요약할 것.
3. 주요 변경 사항을 마크다운 글머리 기호를 사용하여 명확하고 간결하게 나열할 것.
4. 변경된 파일 중에서 리뷰어가 가장 집중해서 봐야 할 핵심 비즈니스 로직 파일이나 컴포넌트를 강조할 것.
5. 프론트엔드 UI의 변경이나 백엔드 API 명세(엔드포인트, 파라미터, 응답값 등)의 변경 사항이 있다면 상세히 명시할 것.
6. 데이터베이스 스키마 변경, 인덱스 추가, 또는 마이그레이션 스크립트가 포함되어 있는지 확인할 것.
7. 리뷰어나 QA 팀이 이 PR의 변경 사항을 검증하기 위한 구체적이고 재현 가능한 테스트 시나리오를 작성할 것.
8. 의존성(Dependency) 패키지가 추가/삭제되었거나, Docker 및 환경 변수(.env) 설정 변경이 있다면 반드시 안내할 것.
9. 이 PR이 프로젝트의 아키텍처나 기존 시스템에 미칠 수 있는 잠재적인 영향도(Impact)를 분석하여 서술할 것.
10. 관련된 이슈 트래커 번호(예: Jira 티켓, GitHub 이슈)를 연결할 수 있도록 [Issue #] 형태의 자리표시자를 제공할 것.
11. 전체적인 문서는 마크다운(Markdown) 문법을 적극 활용하여 제목, 굵은 글씨, 코드 블록 등으로 가독성 높게 포맷팅할 것.
"""

[pr_code_suggestions]
extra_instructions = """
1. 모든 코드 개선 제안과 그에 대한 설명은 반드시 한국어로 작성할 것.
2. 알고리즘의 시간/공간 복잡도를 낮추거나 자원을 효율적으로 사용할 수 있는 성능 최적화 방안을 제시할 것.
3. 사용 중인 언어나 프레임워크의 최신 기능(예: Stream API, 패턴 매칭 등)을 활용해 개선할 수 있다면 제안할 것.
5. 중복 코드가 존재한다면 공통 유틸리티나 헬퍼로 추출하여 재사용성을 높이도록 안내할 것.
6. 결합도가 높다면 의존성 주입(DI)이나 관심사 분리(SoC)를 통해 테스트 용이성을 높이는 설계를 조언할 것.
"""